<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infiniti Servizi — Matrice di Assegnazione</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#fff;--text:#1a1a2e;--text2:#4a4a5a;--text3:#8a8a9a;--border:#e5e5ea;--border-l:#f0f0f4;--blue:#185FA5;--red:#A32D2D;--green:#0F6E56;--amber:#854F0B;--violet:#534AB7;--teal:#0E7C86;--brand:#1a1f2e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text)}
.header{padding:24px 28px 0}
.header h1{font-size:20px;font-weight:600}
.header .sub{font-size:12px;color:var(--text3);margin-top:4px;margin-bottom:20px}
.tabs{display:flex;gap:0;padding:0 28px;border-bottom:1px solid var(--border)}
.tab{padding:10px 20px;font-size:12px;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;color:var(--text3);font-family:inherit;font-weight:400}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--text);font-weight:500;border-bottom-color:var(--blue)}
.content{padding:20px 28px 40px;display:none}
.content.active{display:block}
.alert{padding:12px 16px;background:#FAEEDA;border-radius:8px;border-left:3px solid var(--amber);margin-bottom:20px;font-size:11px;color:var(--amber)}
.alert b{font-weight:600}
.dept{margin-bottom:24px}
.dept-head{padding:10px 16px;border-radius:8px 8px 0 0;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;color:#fff}
.dept-body{border:0.5px solid var(--border);border-top:none;border-radius:0 0 8px 8px}
.role-row{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:0.5px solid var(--border-l)}
.role-row:last-child{border-bottom:none}
.role-label{flex:0 0 240px;display:flex;align-items:center;gap:8px}
.role-label .title{font-size:13px;font-weight:500}
.tag{font-size:9px;padding:2px 8px;border-radius:8px;font-weight:500;white-space:nowrap;display:inline-block}
.tag-resp{background:#E6F1FB;color:var(--blue)}
.tag-sr{background:#EEEDFE;color:var(--violet)}
.tag-op{background:var(--border-l);color:var(--text2)}
.tag-new{background:#FAEEDA;color:var(--amber)}
.role-select{flex:1;max-width:280px}
.role-select select{width:100%;padding:6px 10px;font-size:13px;border:0.5px solid var(--border);border-radius:6px;font-family:inherit;outline:none;background:#fff;color:var(--text)}
.role-select select.empty{background:#f9f9fb;color:var(--text3)}
.role-note{flex:0 0 220px;font-size:11px;color:var(--text3);font-style:italic}
/* People tab */
.add-row{display:flex;gap:8px;margin-bottom:20px;align-items:flex-end}
.add-row .field{flex:1}
.add-row label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:4px}
.add-row input{width:100%;padding:8px 12px;font-size:13px;border:0.5px solid var(--border);border-radius:6px;font-family:inherit;outline:none}
.add-row input:focus{border-color:var(--blue)}
.btn{padding:8px 20px;font-size:12px;font-weight:500;border:none;border-radius:6px;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-green{background:var(--green);color:#fff}
.btn-red-outline{background:none;border:1px solid #FCEBEB;color:var(--red);font-size:11px;padding:6px 16px}
.people-table{border:0.5px solid var(--border);border-radius:8px;overflow:hidden}
.people-header{display:flex;padding:8px 16px;border-bottom:1px solid var(--border);background:#f9f9fb}
.people-header span{font-size:10px;text-transform:uppercase;letter-spacing:0.04em;color:var(--text3);font-weight:500}
.people-row{display:flex;align-items:center;padding:10px 16px;border-bottom:0.5px solid var(--border-l)}
.people-row:last-child{border-bottom:none}
.col-name{flex:0 0 240px;font-size:13px;font-weight:500}
.col-note{flex:1;font-size:11px;color:var(--text3);font-style:italic}
.col-status{flex:0 0 140px}
.col-action{flex:0 0 80px;text-align:right}
.status-tag{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:500}
.status-assigned{background:#E1F5EE;color:var(--green)}
.status-free{background:#FAEEDA;color:var(--amber)}
.remove-btn{font-size:11px;color:var(--red);background:none;border:none;cursor:pointer;font-family:inherit;text-decoration:underline}
.reset-row{margin-top:20px;display:flex;justify-content:flex-end}
@media(max-width:900px){.role-label{flex:0 0 180px}.role-note{display:none}.col-name{flex:0 0 160px}}
@media(max-width:600px){
  .header{padding:16px 16px 0}
  .header h1{font-size:17px}
  .tabs{padding:0 16px}
  .content{padding:16px 16px 32px!important}
  .role-row{flex-wrap:wrap;gap:6px;padding:10px 12px}
  .role-label{flex:1 1 100%!important}
  .role-select{flex:1 1 100%!important;max-width:none!important}
  .role-select select{width:100%}
  .role-note{display:none}
  .add-row{flex-wrap:wrap}
  .add-row .field{flex:1 1 100%}
  .add-row .btn{width:100%}
  .people-row{flex-wrap:wrap;gap:4px;padding:10px 12px}
  .col-name{flex:1 1 100%!important}
  .col-note{flex:1 1 100%!important;margin-bottom:4px}
  .col-status{flex:0 0 auto}
  .col-action{flex:0 0 auto}
  .people-header{display:none}
  .dept-head{font-size:10px;padding:8px 12px}
}
@media print{.tabs{display:none}.content{display:block!important}select{-webkit-appearance:none;border:none;font-weight:500}}
</style>
</head>
<body>

<div class="header">
  <h1>Matrice di Assegnazione</h1>
  <div class="sub">Infiniti Servizi S.r.l. — Persona → Ruolo target</div>
</div>
<div class="tabs">
  <button class="tab active" onclick="switchTab('assign')">Assegnazione ruoli</button>
  <button class="tab" onclick="switchTab('people')">Gestione dipendenti</button>
</div>

<div class="content active" id="tab-assign"></div>
<div class="content" id="tab-people"></div>

<script>
const STORAGE_KEY = 'cedis-matrice-v2';

const DEPARTMENTS = [
  {id:'direzione',name:'Direzione Operativa',color:'#1a1f2e',roles:[
    {id:'dir-op',title:'Direttore Operativo',level:'new',slots:1},
    {id:'compliance',title:'Responsabile Compliance',level:'resp',slots:1}
  ]},
  {id:'presidenza',name:'Presidenza',color:'#8a8a9a',roles:[
    {id:'ass-pres',title:'Assistente di Presidenza',level:'op',slots:1}
  ]},
  {id:'paghe',name:'Reparto Paghe',color:'#185FA5',roles:[
    {id:'paghe-resp',title:'Responsabile Paghe',level:'resp',slots:1},
    {id:'paghe-sr',title:'Operativo Senior Paghe',level:'sr',slots:2},
    {id:'paghe-op',title:'Operativo Paghe',level:'op',slots:8}
  ]},
  {id:'assunzioni',name:'Reparto Assunzioni',color:'#854F0B',roles:[
    {id:'ass-resp',title:'Responsabile Assunzioni',level:'resp',slots:1},
    {id:'ass-sr',title:'Operativo Senior Assunzioni',level:'sr',slots:2},
    {id:'ass-op',title:'Operativo Assunzioni',level:'op',slots:8}
  ]},
  {id:'amministrazione',name:'Reparto Amministrazione',color:'#0F6E56',roles:[
    {id:'amm-resp',title:'Responsabile Amministrazione',level:'resp',slots:1},
    {id:'amm-tes',title:'Operativo Tesoreria',level:'op',slots:5},
    {id:'amm-fatt',title:'Operativo Fatturazione',level:'op',slots:5},
    {id:'amm-ctrl',title:'Operativo Controllo',level:'op',slots:2}
  ]},
  {id:'segreteria',name:'Segreteria / Front Office',color:'#0E7C86',roles:[
    {id:'segr-resp',title:'Responsabile Desk',level:'resp',slots:1},
    {id:'segr-op',title:'Operativo Desk',level:'op',slots:2}
  ]},
  {id:'sicurezza',name:'Reparto Sicurezza',color:'#534AB7',roles:[
    {id:'sic-resp',title:'Responsabile Sicurezza',level:'resp',slots:1},
    {id:'sic-op',title:'Operativo Sicurezza',level:'op',slots:2}
  ]},
  {id:'commerciale',name:'Commerciale',color:'#6B8E23',roles:[
    {id:'comm-resp',title:'Responsabile Commerciale',level:'resp',slots:1},
    {id:'comm-op',title:'Operativo Commerciale',level:'op',slots:2}
  ]},
  {id:'catering',name:'Reparto Catering',color:'#9B7A65',roles:[
    {id:'cat-resp',title:'Responsabile Catering',level:'resp',slots:1},
    {id:'cat-op',title:'Operativo Catering',level:'op',slots:5}
  ]}
];

const DEFAULT_EMPLOYEES = [
  {id:'e1',name:'Monica Battisti',note:'Oggi: coordinamento + compliance'},
  {id:'e2',name:'Nansi Mostafa',note:'Resp. Amministrazione attuale'},
  {id:'e3',name:'Simone Baiano',note:''},
  {id:'e4',name:'Luca Monetti',note:''},
  {id:'e5',name:'Simona Bompan',note:''},
  {id:'e6',name:'Bruna Maria Dell\'Aquila',note:'Mansioni provvisorie'},
  {id:'e7',name:'Marco Mangione',note:'Mansioni provvisorie'},
  {id:'e8',name:'Martina Caretti',note:'Mansioni provvisorie'},
  {id:'e9',name:'Bogdan Pascu',note:'Mansioni provvisorie'},
  {id:'e10',name:'Fabiola Ferreri',note:'Resp. Paghe attuale (solo nominale)'},
  {id:'e11',name:'Elisa Liberti',note:''},
  {id:'e12',name:'Giorgio Maria Vindigni',note:''},
  {id:'e13',name:'Nicoletta Mignacca',note:'Supporta anche Assunzioni'},
  {id:'e14',name:'Luisa Petrilli',note:''},
  {id:'e15',name:'Stefania Cassani',note:''},
  {id:'e16',name:'Noemi Reggiani',note:'Resp. di fatto Assunzioni'},
  {id:'e17',name:'Lorenzo Garifo',note:'Quasi autonomo'},
  {id:'e18',name:'Maria Giulia Magliona',note:'In formazione'},
  {id:'e19',name:'Simona Porcelli',note:'Opera fuori controllo'},
  {id:'e20',name:'Matteo Giubilei',note:'Part-time, in uscita'},
  {id:'e21',name:'Giulia',note:'Desk attuale'},
  {id:'e22',name:'Erika',note:'Desk attuale'},
  {id:'e23',name:'Maila',note:'Supporto desk'},
  {id:'e24',name:'Edoardo Mele',note:'Oggi: Sicurezza + supervisione + catering'},
  {id:'e25',name:'Mattia Lamberti',note:''},
  {id:'e26',name:'Giacomo Grillo',note:'Perimetro indefinito attualmente'},
  {id:'e27',name:'Giuseppe Balestrieri',note:'Resp. Catering'},
  {id:'e28',name:'Alessio Nolis',note:''},
  {id:'e29',name:'Jonatan Lagaria',note:''},
  {id:'e30',name:'Lorenzo Mele',note:''},
  {id:'e31',name:'Ambra',note:'Telefonate + fatture su indicazione Nansi'},
  {id:'e32',name:'Luca Tonetti',note:'Bonifici su indicazione Nansi'},
  {id:'e33',name:'Francesco Caponi',note:'Coord. Assunzioni nel vecchio mansionario'}
];

const LEVEL_MAP = {resp:'tag-resp',sr:'tag-sr',op:'tag-op',new:'tag-new'};
const LEVEL_LABEL = {resp:'Responsabile',sr:'Senior',op:'Operativo',new:'Ruolo nuovo'};

let employees = [];
let assignments = {};

function load(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){const d=JSON.parse(raw);employees=d.employees||[...DEFAULT_EMPLOYEES];assignments=d.assignments||{}}
    else{employees=[...DEFAULT_EMPLOYEES];assignments={}}
  } catch(e){employees=[...DEFAULT_EMPLOYEES];assignments={}}
}

function persist(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify({employees,assignments}))}catch(e){}
}

function getAllAssigned(){return new Set(Object.values(assignments))}

function getUnassigned(){const a=getAllAssigned();return employees.filter(e=>!a.has(e.id))}

function switchTab(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.content').forEach(c=>c.classList.remove('active'));
  document.querySelector('.tab:nth-child('+(t==='assign'?1:2)+')').classList.add('active');
  document.getElementById('tab-'+t).classList.add('active');
  render();
}

function assign(roleId,slotIdx,empId){
  const k=roleId+'-'+slotIdx;
  if(empId==='')delete assignments[k];
  else assignments[k]=empId;
  persist();render();
}

function addEmployee(){
  const nameEl=document.getElementById('new-name');
  const noteEl=document.getElementById('new-note');
  const name=nameEl.value.trim();
  if(!name)return;
  employees.push({id:'e'+Date.now(),name,note:noteEl.value.trim()});
  nameEl.value='';noteEl.value='';
  persist();render();
}

function removeEmployee(id){
  employees=employees.filter(e=>e.id!==id);
  Object.keys(assignments).forEach(k=>{if(assignments[k]===id)delete assignments[k]});
  persist();render();
}

function resetAll(){
  if(!confirm('Vuoi resettare tutto ai dati iniziali?'))return;
  employees=JSON.parse(JSON.stringify(DEFAULT_EMPLOYEES));
  assignments={};
  persist();render();
}

function render(){renderAssign();renderPeople()}

function renderAssign(){
  const el=document.getElementById('tab-assign');
  const unassigned=getUnassigned();
  const allAssigned=getAllAssigned();
  let h='';

  if(unassigned.length>0){
    h+='<div class="alert"><b>'+unassigned.length+(unassigned.length===1?' persona non assegnata':' persone non assegnate')+':</b> '+unassigned.map(e=>e.name).join(', ')+'</div>';
  }

  DEPARTMENTS.forEach(dept=>{
    h+='<div class="dept"><div class="dept-head" style="background:'+dept.color+'">'+dept.name+'</div><div class="dept-body">';
    dept.roles.forEach(role=>{
      // Count assigned for this role
      let assignedCount=0;
      for(let i=0;i<role.slots;i++){if(assignments[role.id+'-'+i])assignedCount++}
      const showSlots=Math.min(assignedCount+1,role.slots);

      for(let i=0;i<showSlots;i++){
        const k=role.id+'-'+i;
        const val=assignments[k]||'';
        const emp=val?employees.find(e=>e.id===val):null;

        // Build options: unassigned + current value
        let opts='<option value="">— seleziona persona —</option>';
        employees.forEach(e=>{
          if(e.id===val||!allAssigned.has(e.id)){
            opts+='<option value="'+e.id+'"'+(e.id===val?' selected':'')+'>'+e.name+'</option>';
          }
        });

        h+='<div class="role-row">';
        h+='<div class="role-label">';
        if(i===0)h+='<span class="title">'+role.title+'</span><span class="tag '+LEVEL_MAP[role.level]+'">'+LEVEL_LABEL[role.level]+'</span>';
        h+='</div>';
        h+='<div class="role-select"><select class="'+(val?'':'empty')+'" onchange="assign(\''+role.id+'\','+i+',this.value)">'+opts+'</select></div>';
        h+='<div class="role-note">'+(emp&&emp.note?emp.note:'')+'</div>';
        h+='</div>';
      }
    });
    h+='</div></div>';
  });

  el.innerHTML=h;
}

function renderPeople(){
  const el=document.getElementById('tab-people');
  const allAssigned=getAllAssigned();
  let h='';

  h+='<div class="add-row">';
  h+='<div class="field"><label>Nome e Cognome</label><input id="new-name" placeholder="es. Mario Rossi" onkeydown="if(event.key===\'Enter\')addEmployee()"></div>';
  h+='<div class="field"><label>Note (opzionale)</label><input id="new-note" placeholder="es. Nuova risorsa" onkeydown="if(event.key===\'Enter\')addEmployee()"></div>';
  h+='<button class="btn btn-green" onclick="addEmployee()">Aggiungi</button>';
  h+='</div>';

  h+='<div class="people-table">';
  h+='<div class="people-header"><span class="col-name">Nome</span><span class="col-note">Note</span><span class="col-status">Stato</span><span class="col-action"></span></div>';
  employees.forEach(emp=>{
    const assigned=allAssigned.has(emp.id);
    h+='<div class="people-row">';
    h+='<div class="col-name">'+emp.name+'</div>';
    h+='<div class="col-note">'+(emp.note||'—')+'</div>';
    h+='<div class="col-status"><span class="status-tag '+(assigned?'status-assigned':'status-free')+'">'+(assigned?'Assegnato':'Non assegnato')+'</span></div>';
    h+='<div class="col-action"><button class="remove-btn" onclick="removeEmployee(\''+emp.id+'\')">Rimuovi</button></div>';
    h+='</div>';
  });
  h+='</div>';

  h+='<div class="reset-row"><button class="btn btn-red-outline" onclick="resetAll()">Reset a dati iniziali</button></div>';

  el.innerHTML=h;
}

load();
render();
</script>
</body>
</html>
